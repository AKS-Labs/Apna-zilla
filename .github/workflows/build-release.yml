name: Build Release APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger directly from the GitHub actions tab

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Prepare Keystore Signing Configurations
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "Decoding production keystore from GitHub Secrets..."
          echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
        else
          echo "No KEYSTORE_BASE64 secret found. Auto-generating a temporary self-signed key to ensure the compile finishes..."
          keytool -genkey -v -keystore my-upload-key.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${STORE_PASSWORD:-temporarypassword}" \
            -keypass "${KEY_PASSWORD:-temporarypassword}" \
            -dname "CN=VolumeGuard, OU=Builder, O=AIStudio, L=Build, S=CA, C=US"
          
          # Export transient passwords to use for gradle task
          echo "STORE_PASSWORD=${STORE_PASSWORD:-temporarypassword}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${KEY_PASSWORD:-temporarypassword}" >> $GITHUB_ENV
        fi

    - name: Build with Gradle
      env:
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || env.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || env.KEY_PASSWORD }}
        KEYSTORE_PATH: my-upload-key.jks
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleRelease
        else
          gradle assembleRelease
        fi

    - name: Upload Built Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: volume-guard-release-apk
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error
        retention-days: 14
